name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install
        run: bun install --frozen-lockfile

      - name: Sync versions
        run: bun ./tools/version.ts

      - name: Check working tree is version-clean
        run: git diff --exit-code

      - name: Typecheck
        run: |
          ./node_modules/.bin/tsc -p packages/core/tsconfig.json
          ./node_modules/.bin/tsc -p apps/starter/tsconfig.json

      - name: Test
        run: bun test

      - name: Build
        run: |
          bun build ./packages/core/src/index.ts ./packages/core/bin/init.ts --target bun --outdir ./packages/core/dist
          bun build ./apps/starter/src/index.ts --target bun --outdir ./apps/starter/dist
