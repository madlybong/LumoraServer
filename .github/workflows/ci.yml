name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install
        run: bun install --frozen-lockfile

      - name: Sync versions
        run: bun run version:sync

      - name: Check working tree is version-clean
        run: git diff --exit-code

      - name: Typecheck
        run: bun run check

      - name: Test
        run: bun test

      - name: Build
        run: bun run build
