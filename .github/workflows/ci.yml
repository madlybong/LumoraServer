name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    name: Typecheck · Test · Build
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     lumora_test
          POSTGRES_PASSWORD: lumora_test
          POSTGRES_DB:       lumora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      TEST_PG_URL: postgres://lumora_test:lumora_test@localhost:5432/lumora_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync versions
        run: bun run version:sync

      - name: Verify version consistency
        run: git diff --exit-code

      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run check

      - name: Test
        run: bun run test

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumora-server-dist
          path: packages/core/dist/
          if-no-files-found: error
          retention-days: 7
