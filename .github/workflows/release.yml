name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install
        run: bun install --frozen-lockfile

      - name: Sync versions
        run: bun run version:sync

      - name: Verify version state
        run: git diff --exit-code

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Pack package
        working-directory: packages/core
        run: bun pm pack

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: astrake-lumora-package
          path: packages/core/*.tgz

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: packages/core
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --access public
