name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Setup Node for npm registry
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install
        run: bun install --frozen-lockfile

      - name: Sync versions
        run: bun ./tools/version.ts

      - name: Verify version state
        run: git diff --exit-code

      - name: Test
        run: bun test

      - name: Build
        run: |
          bun build ./packages/core/src/index.ts ./packages/core/bin/init.ts --target bun --outdir ./packages/core/dist
          bun build ./apps/starter/src/index.ts --target bun --outdir ./apps/starter/dist

      - name: Pack package
        working-directory: packages/core
        run: bun pm pack

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: astrake-lumora-package
          path: packages/core/*.tgz

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --access public
